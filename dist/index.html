<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出差看板</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
      #app { padding: 32px; max-width: 1100px; margin: 0 auto; }

      .toolbar { margin-bottom: 20px; }
      .toolbar h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }

      .editor {
        width: 100%;
        padding: 10px;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 13px;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        resize: vertical;
        outline: none;
        background: #fff;
        line-height: 1.6;
      }
      .editor:focus { border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,.15); }

      .btn {
        display: inline-block;
        padding: 6px 14px;
        background: #4f6ef7;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .btn:hover { background: #3b5de7; }

      .board {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
      }
      .board th {
        background: #f7f8fa;
        padding: 10px 8px;
        font-weight: 600;
        font-size: 14px;
        color: #333;
        border-bottom: 2px solid #e8eaed;
        text-align: center;
      }
      .board td {
        padding: 10px 8px;
        text-align: center;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }
      .board .corner { width: 40px; }
      .board .index { color: #999; font-size: 12px; background: #fafbfc; }
      .board .cell {
        background: #eef3ff;
        border-radius: 4px;
        font-weight: 500;
        color: #2d4fc4;
      }
      .board tr:last-child td { border-bottom: none; }
      .empty { color: #999; padding: 20px; text-align: center; }
    </style>
    <script type="module" crossorigin src="/assets/index-D16k7-JC.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
